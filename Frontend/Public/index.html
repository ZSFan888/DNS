<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DNS Control Center</title><style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#080b14,#0f1730);color:#eef2ff}.wrap{max-width:1500px;margin:0 auto;padding:24px}.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;margin-bottom:16px}input,button,select{width:100%;box-sizing:border-box;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:#111833;color:#e8ecff;padding:10px}button{cursor:pointer;background:#335cff;border:none;font-weight:600}.grid{display:grid;grid-template-columns:1fr 1fr 1.6fr;gap:16px}.row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}.item{padding:10px;border-radius:12px;background:rgba(255,255,255,.04);margin-bottom:8px}.small{font-size:12px;color:#aeb8e6}.hide{display:none}.tabs{display:flex;gap:8px;margin-bottom:12px}.tab{padding:10px 14px;border-radius:999px;background:#1b2550;cursor:pointer}.tab.active{background:#335cff}</style></head><body><div class="wrap"><div class="card" id="schemaStatus"><div class="small">正在检查数据库结构…</div></div><div class="card" id="login"><h1>DNS Control Center</h1><div class="row"><input id="pw" type="password" placeholder="管理员密码"><button onclick="login()">登录</button></div></div><div id="app" class="hide"><div class="card"><div class="tabs"><div class="tab active" onclick="show('admin')">管理员</div><div class="tab" onclick="show('user')">普通用户</div><div class="tab" onclick="show('audit')">审计日志</div><div class="tab" onclick="show('profile')">我的信息</div></div><div id="adminView"><h1>DNS Control Center</h1><div class="small">管理员控制台</div></div><div id="userView" class="hide"><h1>普通用户控制台</h1><div class="small">仅管理被授权的子域名</div></div><div id="auditView" class="hide"><h1>审计日志</h1><div id="auditList"></div></div><div id="profileView" class="hide"><h1>我的信息</h1><div id="profilePanel"></div><div class="card" style="margin-top:12px"><h2>修改密码</h2><div class="row"><input id="oldpw" type="password" placeholder="旧密码"><input id="newpw" type="password" placeholder="新密码"></div><button onclick="changePassword()">保存新密码</button></div></div></div><div class="grid"><section class="card"><h2>根域名</h2><div class="row"><input id="rd-domain" placeholder="example.com"><input id="rd-zone" placeholder="zone id"></div><button onclick="addRoot()">添加根域名</button><div id="roots"></div></section><section class="card"><h2>子域名 / 授权</h2><div class="row"><input id="sd-root" placeholder="root domain id"><input id="sd-prefix" placeholder="prefix"></div><input id="sd-owner" placeholder="owner user id" style="margin-bottom:10px"><button onclick="addSub()">申请子域名</button><div class="row" style="margin-top:12px"><input id="bind-sub" placeholder="subdomain id"><input id="bind-user" placeholder="user id"></div><div class="row"><button onclick="bindAccess()" style="background:#2a8f6b">授权普通用户</button><button onclick="revokeAccess()" style="background:#ff4d6d">撤销授权</button></div><div id="subs"></div></section><section class="card"><h2>DNS 记录</h2><div class="row"><input id="dr-sub" placeholder="subdomain id"><input id="dr-type" placeholder="A / CNAME / TXT"></div><div class="row"><input id="dr-name" placeholder="@ 或记录名"><input id="dr-ttl" placeholder="300"></div><input id="dr-content" placeholder="内容" style="margin-bottom:10px"><div class="row"><button onclick="addRecord()">添加记录</button><button onclick="loadRecords()" style="background:#2a3a80">查询记录</button></div><div id="records"></div></section></div></div></div><script>let token=''; initState();const hdr=()=>({'Content-Type':'application/json','Authorization':token?`Bearer ${token}`:''});async function api(u,m='GET',b){const r=await fetch(u,{method:m,headers:hdr(),body:b?JSON.stringify(b):undefined}); return await r.json()} async function initState(){ document.getElementById("schemaStatus").innerHTML = `<div class="small">数据库结构已就绪，等待登录。</div>` }
async function login(){const r=await api('/api/auth/login','POST',{password:pw.value}); if(r.ok){token=r.sid; document.cookie=`dns_session=${r.sid}; Path=/; SameSite=Lax`; document.getElementById("schemaStatus").innerHTML = `<div class="small">登录成功，已进入控制台。</div>`; loginBox(); refresh();}} function loginBox(){login.classList.add('hide'); app.classList.remove('hide');} function show(mode){const labels={admin:'管理员',user:'普通用户',audit:'审计日志',profile:'我的信息'}; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); [...document.querySelectorAll('.tab')].find(t=>t.textContent.includes(labels[mode])).classList.add('active'); adminView.classList.toggle('hide',mode!=='admin'); userView.classList.toggle('hide',mode!=='user'); auditView.classList.toggle('hide',mode!=='audit'); profileView.classList.toggle('hide',mode!=='profile'); if(mode==='audit') loadAudit(); if(mode==='profile') loadProfile() } async function loadAudit(page=1){ const r=await api(`/api/audit?page=${page}&size=20`); document.getElementById('auditList').innerHTML=(r.data||[]).map(x=>`<div class="item">#${x.id} ${x.action} ${x.target}<div class="small">${x.user_id} / ${x.role} / ${x.created_at}</div><pre>${x.detail||''}</pre></div>`).join('')||'暂无日志'}
async function loadProfile(){ const r=await api('/api/me'); document.getElementById('profilePanel').innerHTML = r.ok ? `<div class="item"><div><b>用户 ID</b></div><div class="small">${r.data.user_id}</div></div><div class="item"><div><b>角色</b></div><div class="small">${r.data.role}</div></div><div class="item"><div><b>拥有子域名</b></div><div class="small">${r.data.subdomains}</div></div><div class="item"><div><b>授权子域名</b></div><div class="small">${r.data.access}</div></div><div class="item"><div><b>过期时间</b></div><div class="small">${r.data.expires_at}</div></div>` : '未登录' }
async function changePassword(){ const r=await api('/api/password','POST',{old_password:oldpw.value,new_password:newpw.value}); alert(r.ok?'密码已更新':'修改失败'); if(r.ok){ oldpw.value=''; newpw.value=''; } }
async function refresh(){const roots=await api('/api/root-domains'); document.getElementById('roots').innerHTML=(roots.data||[]).map(x=>`<div class="item">#${x.id} ${x.domain_name}<div class="small">${x.status} ${x.created_at}</div><button onclick="delRoot(${x.id})" style="margin-top:8px;background:#ff4d6d">删除</button></div>`).join('')||''; const subs=await api('/api/my-subdomains'); document.getElementById('subs').innerHTML=(subs.data||[]).map(x=>`<div class="item">#${x.id} ${x.full_domain}<div class="small">root:${x.root_domain_id} owner:${x.owner_user_id}</div><button onclick="delSub(${x.id})" style="margin-top:8px;background:#ff4d6d">删除</button></div>`).join('')||'';} async function loadRecords(){const subId=dr_sub.value;if(!subId)return; const r=await api(`/api/dns-records?subdomain_id=${subId}`); document.getElementById('records').innerHTML=(r.data||[]).map(x=>`<div class="item">#${x.id} [${x.type}] ${x.name} -> ${x.content}<div class="small">ttl:${x.ttl} proxied:${x.proxied} updated:${x.updated_at}</div><div class="row" style="margin-top:8px"><input id="edit-content-${x.id}" placeholder="新内容" value="${x.content}"><button onclick="editRecord(${x.id})" style="background:#2a8f6b">保存</button></div><button onclick="delRecord(${x.id})" style="margin-top:8px;background:#ff4d6d">删除</button></div>`).join('')||'暂无记录'} async function addRoot(){const r=await api('/api/root-domains','POST',{domain_name:rd_domain.value,zone_id:rd_zone.value});refresh()} async function delRoot(id){await api(`/api/root-domains/${id}`,'DELETE');refresh()} async function addSub(){await api('/api/subdomains','POST',{root_domain_id:+sd_root.value,prefix:sd_prefix.value,owner_user_id:sd_owner.value});refresh()} async function delSub(id){await api(`/api/subdomains/${id}`,'DELETE');refresh()} async function bindAccess(){await api('/api/bind-access','POST',{subdomain_id:+bind_sub.value,user_id:bind_user.value});} async function revokeAccess(){await api('/api/revoke-access','POST',{subdomain_id:+bind_sub.value,user_id:bind_user.value});} async function addRecord(){await api('/api/dns-records','POST',{subdomain_id:+dr_sub.value,type:dr_type.value,name:dr_name.value,content:dr_content.value,ttl:+dr_ttl.value||300});loadRecords()} async function editRecord(id){const content=document.getElementById(`edit-content-${id}`).value;await api(`/api/dns-records/${id}`,'PUT',{content});loadRecords()} async function delRecord(id){await api(`/api/dns-records/${id}`,'DELETE');loadRecords()}</script></body></html>
