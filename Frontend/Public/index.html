<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DNS Control Center</title><style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#080b14,#0f1730);color:#eef2ff}.wrap{max-width:1100px;margin:0 auto;padding:24px}.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;margin-bottom:16px}input,button{width:100%;box-sizing:border-box;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:#111833;color:#e8ecff;padding:10px}button{cursor:pointer;background:#335cff;border:none;font-weight:600}.row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}.small{font-size:12px;color:#aeb8e6}</style></head><body><div class="wrap"><div class="card"><h1>DNS Control Center</h1><div class="small">静态首页已独立，API 仅由 /api/* 进入 Worker。</div></div><div class="card"><h2>状态检查</h2><button onclick="check()">检查 API</button><div id="out" class="small" style="margin-top:10px"></div></div></div><script>async function check(){try{const r=await fetch('/api/me',{credentials:'include'});out.textContent='API 响应: '+r.status}catch(e){out.textContent='API 请求失败: '+e.message}}</script></body></html>
