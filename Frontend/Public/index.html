<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DNS Control Center</title><style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#080b14,#0f1730);color:#eef2ff}.wrap{max-width:1500px;margin:0 auto;padding:24px}.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;margin-bottom:16px}input,button,select{width:100%;box-sizing:border-box;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:#111833;color:#e8ecff;padding:10px}button{cursor:pointer;background:#335cff;border:none;font-weight:600}.grid{display:grid;grid-template-columns:1fr 1fr 1.6fr;gap:16px}.row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}.item{padding:10px;border-radius:12px;background:rgba(255,255,255,.04);margin-bottom:8px}.small{font-size:12px;color:#aeb8e6}.hide{display:none}.tabs{display:flex;gap:8px;margin-bottom:12px}.tab{padding:10px 14px;border-radius:999px;background:#1b2550;cursor:pointer}.tab.active{background:#335cff}</style></head><body><div class="wrap"><div class="card" id="login"><h1>DNS Control Center</h1><div class="row"><input id="pw" type="password" placeholder="管理员密码"><button onclick="login()">登录</button></div></div><div id="app" class="hide"><div class="card"><div class="tabs"><div class="tab active" onclick="show('admin')">管理员</div><div class="tab" onclick="show('user')">普通用户</div></div><div id="adminView"><h1>DNS Control Center</h1><div class="small">管理员控制台</div></div><div id="userView" class="hide"><h1>普通用户控制台</h1><div class="small">仅管理被授权的子域名</div></div></div><div class="grid"><section class="card"><h2>根域名</h2><div class="row"><input id="rd-domain" placeholder="example.com"><input id="rd-zone" placeholder="zone id"></div><button onclick="addRoot()">添加根域名</button><div id="roots"></div></section><section class="card"><h2>子域名 / 授权</h2><div class="row"><input id="sd-root" placeholder="root domain id"><input id="sd-prefix" placeholder="prefix"></div><input id="sd-owner" placeholder="owner user id" style="margin-bottom:10px"><button onclick="addSub()">申请子域名</button><div class="row" style="margin-top:12px"><input id="bind-sub" placeholder="subdomain id"><input id="bind-user" placeholder="user id"></div><button onclick="bindAccess()" style="background:#2a8f6b">授权普通用户</button><div id="subs"></div></section><section class="card"><h2>DNS 记录</h2><div class="row"><input id="dr-sub" placeholder="subdomain id"><input id="dr-type" placeholder="A / CNAME / TXT"></div><div class="row"><input id="dr-name" placeholder="@ 或记录名"><input id="dr-ttl" placeholder="300"></div><input id="dr-content" placeholder="内容" style="margin-bottom:10px"><div class="row"><button onclick="addRecord()">添加记录</button><button onclick="loadRecords()" style="background:#2a3a80">查询记录</button></div><div id="records"></div></section></div></div></div><script>let token='';const hdr=()=>({'Content-Type':'application/json','Authorization':token?`Bearer ${token}`:''});async function api(u,m='GET',b){const r=await fetch(u,{method:m,headers:hdr(),body:b?JSON.stringify(b):undefined}); return await r.json()} async function login(){const r=await api('/api/auth/login','POST',{password:pw.value}); if(r.ok){token=r.sid; document.cookie=`dns_session=${r.sid}; Path=/; SameSite=Lax`; loginBox(); refresh();}} function loginBox(){login.classList.add('hide'); app.classList.remove('hide');} function show(mode){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0?mode==='admin':mode==='user')); adminView.classList.toggle('hide',mode!=='admin'); userView.classList.toggle('hide',mode!=='user')} async function refresh(){const roots=await api('/api/root-domains'); document.getElementById('roots').innerHTML=(roots.data||[]).map(x=>`<div class="item">#${x.id} ${x.domain_name}<div class="small">${x.status} ${x.created_at}</div><button onclick="delRoot(${x.id})" style="margin-top:8px;background:#ff4d6d">删除</button></div>`).join('')||''; const subs=await api('/api/subdomains'); document.getElementById('subs').innerHTML=(subs.data||[]).map(x=>`<div class="item">#${x.id} ${x.full_domain}<div class="small">root:${x.root_domain_id} owner:${x.owner_user_id}</div><button onclick="delSub(${x.id})" style="margin-top:8px;background:#ff4d6d">删除</button></div>`).join('')||'';} async function loadRecords(){const subId=dr_sub.value;if(!subId)return; const r=await api(`/api/dns-records?subdomain_id=${subId}`); document.getElementById('records').innerHTML=(r.data||[]).map(x=>`<div class="item">#${x.id} [${x.type}] ${x.name} -> ${x.content}<div class="small">ttl:${x.ttl} proxied:${x.proxied} updated:${x.updated_at}</div><div class="row" style="margin-top:8px"><input id="edit-content-${x.id}" placeholder="新内容" value="${x.content}"><button onclick="editRecord(${x.id})" style="background:#2a8f6b">保存</button></div><button onclick="delRecord(${x.id})" style="margin-top:8px;background:#ff4d6d">删除</button></div>`).join('')||'暂无记录'} async function addRoot(){const r=await api('/api/root-domains','POST',{domain_name:rd_domain.value,zone_id:rd_zone.value});refresh()} async function delRoot(id){await api(`/api/root-domains/${id}`,'DELETE');refresh()} async function addSub(){await api('/api/subdomains','POST',{root_domain_id:+sd_root.value,prefix:sd_prefix.value,owner_user_id:sd_owner.value});refresh()} async function delSub(id){await api(`/api/subdomains/${id}`,'DELETE');refresh()} async function bindAccess(){await api('/api/bind-access','POST',{subdomain_id:+bind_sub.value,user_id:bind_user.value});} async function addRecord(){await api('/api/dns-records','POST',{subdomain_id:+dr_sub.value,type:dr_type.value,name:dr_name.value,content:dr_content.value,ttl:+dr_ttl.value||300});loadRecords()} async function editRecord(id){const content=document.getElementById(`edit-content-${id}`).value;await api(`/api/dns-records/${id}`,'PUT',{content});loadRecords()} async function delRecord(id){await api(`/api/dns-records/${id}`,'DELETE');loadRecords()}</script></body></html>
